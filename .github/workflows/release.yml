name: Regenerate registry

# On every push to main, rebuild registry.json + catalog.json (+ their schemas)
# from each skill's SKILL.md and catalog/<name>.yaml, and commit them back, pinned
# to the pushed commit. The regenerated commit carries [skip ci] so it does not
# retrigger this workflow (GitHub also skips runs whose head commit message
# contains [skip ci]).

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: per-skill `updated_at` in catalog.json is derived from
          # `git log -- skills/<name>`, which a shallow (depth-1) clone collapses
          # to the same date for every skill.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: installer
        run: uv sync
      - name: Regenerate registry.json + catalog.json + plugin marketplace
        working-directory: installer
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: uv run python scripts/generate_registry.py --commit "$COMMIT_SHA" --schema
      - name: Commit if changed
        env:
          # .claude-plugin/ holds the generated marketplace.json + plugin.json.
          ARTIFACTS: registry.json registry.schema.json catalog.json catalog.schema.json .claude-plugin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $ARTIFACTS
          if git diff --cached --quiet; then
            echo "registry/catalog/marketplace already up to date"
          else
            git commit -m "chore: regenerate registry.json + catalog.json + marketplace [skip ci]"
            git push
          fi
